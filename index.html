<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cookbook Club — Recipe Wheel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #fafaf8; color: #1a1a1a; padding: 2rem; }
  h1 { font-size: 22px; font-weight: 500; letter-spacing: -0.3px; }
  #canvas-wrap { position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; }
  #needle {
    position: absolute;
    right: -18px;
    top: 50%;
    transform: translateY(-50%);
    width: 0; height: 0;
    border-top: 10px solid transparent;
    border-bottom: 10px solid transparent;
    border-right: 32px solid #1a1a1a;
    z-index: 10;
  }
  #wheel { display: block; }
  #spin-btn { font-size: 15px; padding: 10px 36px; cursor: pointer; border-radius: 12px; background: #fff; border: 1.5px solid #ccc; color: #1a1a1a; font-weight: 500; transition: background 0.15s, transform 0.1s; margin-bottom: 1.5rem; }
  #spin-btn:hover { background: #f0f0ec; }
  #spin-btn:active { transform: scale(0.97); }
  #spin-btn:disabled { opacity: 0.45; cursor: default; transform: none; }
  #result-box { min-height: 52px; text-align: center; }
  #result-label { font-size: 13px; color: #888; margin-bottom: 4px; }
  #result-name { font-size: 22px; font-weight: 500; color: #1a1a1a; }
  #header { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; margin-bottom: 2rem; }
  #logo { width: 72px; height: auto; }
</style>
</head>
<body>

<div id="header">
  <img src="images/cookbook-club-logo.png" id="logo" alt="Cookbook Club Logo">
  <h1>Recipe of the Week</h1>
  <p style="font-size: 16px; color: #444; letter-spacing: 0.2px;">Wheel-o'-Meals</p>
</div>

<div id="canvas-wrap">
  <div id="needle"></div>
  <canvas id="wheel"></canvas>
</div>

<audio id="snd-spin" src="sounds/spinning-wheel.mp3"></audio>
<audio id="snd-applause" src="sounds/applause.mp3"></audio>
<button id="spin-btn">Spin the wheel</button>

<div id="result-box">
  <div id="result-label"></div>
  <div id="result-name"></div>
</div>

<script>
const meals = [
  "Tacos",
  "Pizza",
  "Ramen",
  "Frittata",
  "Curry",
  "Pad Thai",
  "Stuffed Vegetables",
  "Kebabs",
  "Jambalaya",
  "Baked Pasta"
];

const palette = [
  "#E63946",
  "#457B9D",
  "#2A9D46",
  "#F4C430",
  "#E07A2F",
  "#9B5DE5",
  "#E63946",
  "#457B9D",
  "#2A9D46",
  "#F4C430",
];

function getTextColor(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const luminance = (0.299*r + 0.587*g + 0.114*b) / 255;
  return luminance > 0.55 ? '#111111' : '#ffffff';
}

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');

const SIZE = 360;
const dpr = window.devicePixelRatio || 1;
canvas.width = SIZE * dpr;
canvas.height = SIZE * dpr;
canvas.style.width = SIZE + 'px';
canvas.style.height = SIZE + 'px';
ctx.scale(dpr, dpr);

const btn = document.getElementById('spin-btn');
const resultLabel = document.getElementById('result-label');
const resultName = document.getElementById('result-name');
const sndSpin = document.getElementById('snd-spin');
const sndApplause = document.getElementById('snd-applause');

const total = meals.length;
const arc = (2 * Math.PI) / total;
const cx = SIZE / 2, cy = SIZE / 2, r = 168;

let currentAngle = 0;
let spinning = false;

function drawWheel(angle) {
  ctx.clearRect(0, 0, SIZE, SIZE);

  for (let i = 0; i < total; i++) {
    const start = angle + i * arc;
    const end = start + arc;
    const fill = palette[i % palette.length];

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = fill;
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + r * Math.cos(start), cy + r * Math.sin(start));
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, 2 * Math.PI);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.stroke();

  for (let i = 0; i < total; i++) {
    const start = angle + i * arc;
    const midAngle = start + arc / 2;
    const fill = palette[i % palette.length];
    const textColor = getTextColor(fill);

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(midAngle);

    ctx.fillStyle = textColor;
    ctx.font = 'bold 13px system-ui, sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';

    const words = meals[i].split(' ');
    const mid = Math.ceil(words.length / 2);
    const line1 = words.slice(0, mid).join(' ');
    const line2 = words.slice(mid).join(' ');
    const textX = r - 14;

    if (line2) {
      ctx.fillText(line1, textX, -9);
      ctx.fillText(line2, textX, 9);
    } else {
      ctx.fillText(line1, textX, 0);
    }

    ctx.restore();
  }

  ctx.beginPath();
  ctx.arc(cx, cy, 20, 0, 2 * Math.PI);
  ctx.fillStyle = '#fafaf8';
  ctx.fill();
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

drawWheel(0);

function easeOut(t) {
  return 1 - Math.pow(1 - t, 3);
}

btn.addEventListener('click', () => {
  if (spinning) return;
  spinning = true;
  btn.disabled = true;
  resultLabel.textContent = '';
  resultName.textContent = '';
  sndSpin.currentTime = 0;
  sndSpin.play();

  const totalRotation = (6 + Math.floor(Math.random() * 4)) * 2 * Math.PI + Math.random() * 2 * Math.PI;
  const duration = 10000;
  const startTime = performance.now();
  const startAngle = currentAngle;

  function frame(now) {
    const t = Math.min((now - startTime) / duration, 1);
    const eased = easeOut(t);
    currentAngle = startAngle + totalRotation * eased;
    drawWheel(currentAngle);

    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      currentAngle = (startAngle + totalRotation) % (2 * Math.PI);
      drawWheel(currentAngle);
      spinning = false;
      btn.disabled = false;
      sndSpin.pause();
      sndSpin.currentTime = 0;
      sndApplause.currentTime = 0;
      sndApplause.play();

      const needleAngle = 0;
      const normalized = ((needleAngle - currentAngle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
      const idx = Math.floor(normalized / arc) % total;
      resultLabel.textContent = "This week's recipe:";
      resultName.textContent = meals[idx];
    }
  }

  requestAnimationFrame(frame);
});
</script>

</body>
</html>
